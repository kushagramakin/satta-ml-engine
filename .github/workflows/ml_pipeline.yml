name: Daily Satta ML Predictor

on:
  schedule:
    # Runs at 00:18 UTC every day (5:48 AM IST)
    # Uses an odd minute to avoid GitHub's server rush hour dropping the task
    - cron: '18 0 * * *'

  workflow_dispatch: 

jobs:
  run-ml-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn firebase-admin requests beautifulsoup4 bs4

      - name: Run ML Script and Push to Firebase
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python main.py

      - name: Commit Updated CSV
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add satta_disawar_historical_data.csv
          git commit -m "Auto-update historical data" || echo "No changes to commit"
          git push
