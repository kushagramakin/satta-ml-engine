name: Daily Satta ML Predictor

on:
  schedule:
    # Runs at 00:15 UTC every day (5:45 AM IST)
    # This ensures the Desawar result is published before scraping
    - cron: '15 0 * * *'
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  run-ml-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn firebase-admin requests beautifulsoup4 bs4

      - name: Run ML Script and Push to Firebase
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python main.py
