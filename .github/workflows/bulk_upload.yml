name: Daily AI Predictor Engine

on:
  schedule:
    # This is UTC time. 00:00 UTC = 5:30 AM IST!
    - cron: '0 0 * * *' 
  workflow_dispatch: # Keeps the manual play button just in case you ever need it

jobs:
  run-ai-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn firebase-admin requests beautifulsoup4
      - env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        # Pointing back to the main brain!
        run: python main.py
